name: Build wxshadow.kpm
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq make wget unzip
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          export NDK_PATH=$PWD/android-ndk-r28/toolchains/llvm/prebuilt/linux-x86_64/bin/
          git clone --depth=1 -b 0.13.2 https://github.com/bmax121/KernelPatch.git /tmp/kp
          git clone --depth=1 https://github.com/udochina/KPM-Build-Anywhere.git /tmp/kpm
          cd /tmp/kpm
          rm -f hello.c hello.kpm hello.lds
          cp $GITHUB_WORKSPACE/kpms/wxshadow/*.c . 2>/dev/null
          cp $GITHUB_WORKSPACE/kpms/wxshadow/*.h . 2>/dev/null
          export KP_DIR=/tmp/kp
          sed -i 's/hello/wxshadow/g' Makefile
          sed -i 's/hello\.o/wxshadow.o wxshadow_pgtable.o wxshadow_handlers.o wxshadow_bp.o wxshadow_scan.o/' Makefile
          make CC=${NDK_PATH}aarch64-linux-android31-clang 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: wxshadow
          path: /tmp/kpm/wxshadow.kpm
