name: Build KPM Modules
on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu cmake
      - name: Setup KernelPatch headers
        run: |
          git clone --depth=1 -b 0.13.2 https://github.com/bmax121/KernelPatch.git /tmp/kp
          echo "KP_DIR=/tmp/kp" >> $GITHUB_ENV
      - name: Build wxshadow.kpm
        run: |
          cd kpms/wxshadow && mkdir -p build && cd build
          cmake -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DKP_DIR=/tmp/kp ../..
          make wxshadow.kpm 2>&1
      - name: Build recompile.kpm
        run: |
          cd kpms/recompile && mkdir -p build && cd build
          cmake -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DKP_DIR=/tmp/kp ../..
          make recompile.kpm 2>&1
      - name: Build hide-maps.kpm
        run: |
          cd kpms/hide-maps && mkdir -p build && cd build
          cmake -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DKP_DIR=/tmp/kp ../..
          make hide-maps.kpm 2>&1
      - name: List results
        run: |
          find kpms -name "*.kpm" -exec ls -lh {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: kpm-modules
          path: kpms/*/build/*.kpm
