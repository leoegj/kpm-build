name: Build KPM Modules
on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: sudo apt-get update -qq && sudo apt-get install -y gcc-aarch64-linux-gnu cmake
      - name: Setup KernelPatch headers
        run: |
          git clone --depth=1 https://github.com/bmax121/KernelPatch.git /tmp/kp
          cd /tmp/kp && git fetch --depth=1 origin 94e5be9cc3f8a6fbd9574155e3e9753200ab9bfb && git checkout FETCH_HEAD
      - name: Build all KPMs
        run: |
          cmake -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DKP_DIR=/tmp/kp .
          make wxshadow.kpm recompile.kpm hide-maps.kpm 2>&1
      - name: List results
        run: find . -name "*.kpm" -exec ls -lh {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: kpm-modules
          path: |
            kpms/wxshadow/wxshadow.kpm
            kpms/recompile/recompile.kpm
            kpms/hide-maps/hide-maps.kpm
