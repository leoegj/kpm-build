name: Build KPM
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu cmake
          for dir in wxshadow hide-so recompile; do
            echo "=== Building $dir ==="
            cd kpms/$dir && mkdir -p build && cd build
            cmake -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc ..
            make ${dir}.kpm
            cd ../../..
          done
      - uses: actions/upload-artifact@v4
        with:
          name: kpm-modules
          path: kpms/*/build/*.kpm
