name: Build KPM
on:
  workflow_dispatch:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wxshadow.kpm
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu cmake
          git clone --depth=1 https://github.com/udochina/KPM-Build-Anywhere.git /tmp/kpm
          mkdir -p /tmp/kpm/kpms/wxshadow
          cp -r kpms/wxshadow/* /tmp/kpm/kpms/wxshadow/
          cd /tmp/kpm && mkdir -p build && cd build
          cmake .. -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          make wxshadow.kpm
          ls -la kpms/wxshadow/build/*.kpm 2>/dev/null || find . -name "wxshadow.kpm"
          mkdir -p /tmp/out
          find . -name "wxshadow.kpm" -exec cp {} /tmp/out/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: kpm-modules
          path: /tmp/out/*.kpm
